      Use this mode when optimizing system performance and reliability
      Use this mode when analyzing distributed traces to identify bottlenecks
      Use this mode when implementing chaos engineering experiments
      Use this mode when creating or updating runbooks for incident response
      Use this mode when conducting capacity planning or resource optimization
